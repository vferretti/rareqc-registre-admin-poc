services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: rareqc_registre
      POSTGRES_USER: rareqc
      POSTGRES_PASSWORD: rareqc
    volumes:
      - registre_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rareqc -d rareqc_registre"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "8082:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: rareqc
      POSTGRES_PASSWORD: rareqc
      POSTGRES_DB: rareqc_registre
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: seed
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: rareqc
      POSTGRES_PASSWORD: rareqc
      POSTGRES_DB: rareqc_registre
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  registre_pgdata:
