services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: rareqc_registre
      POSTGRES_USER: rareqc
      POSTGRES_PASSWORD: rareqc
    volumes:
      - registre_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: rareqc
      POSTGRES_PASSWORD: rareqc
      POSTGRES_DB: rareqc_registre
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  registre_pgdata:
